<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniVibe - Nonton Anime Subtitle Indonesia</title>
    <style>
        :root {
            --bg-dark: #0f0c16;
            --bg-card: #1a1625;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            background: rgba(15, 12, 22, 0.95);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #a78bfa;
            text-decoration: none;
            cursor: pointer;
        }

        .logo span { color: #fff; }

        .search-box {
            display: flex;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 5px 15px;
            border: 1px solid #4c1d95;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            padding: 5px;
            width: 150px;
        }

        .search-box button {
            background: transparent;
            border: none;
            color: #a78bfa;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            height: 200px;
            background: linear-gradient(to right, #0f0c16, #2e1065);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 30px;
            margin: 20px 0 40px 0;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .hero h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #c4b5fd, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .anime-card {
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .anime-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .anime-card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .anime-info { padding: 10px; }

        .anime-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .episode-btn {
            background: #1a1625;
            border: 1px solid #4c1d95;
            color: #c4b5fd;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        
        .video-container { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .close-modal {
            position: absolute; top: 20px; right: 20px;
            color: white; font-size: 30px; cursor: pointer;
        }

        .skeleton {
            background: linear-gradient(90deg, #1a1625 25%, #2e1065 50%, #1a1625 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 10px 20px;
            border-radius: 5px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="videoModal" class="modal">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        <div class="video-container">
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <header>
        <a href="javascript:void(0)" onclick="location.reload()" class="logo">
            <span>Ani</span>Vibe
        </a>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari anime...">
            <button onclick="performSearch()">🔍</button>
        </div>
    </header>

    <div class="container" id="appContent">
        <div class="hero">
            <h1>Nonton Anime<br>Subtitle Indonesia</h1>
        </div>
        
        <h2 id="titleText" class="section-title">Update Terbaru</h2>
        <div class="anime-grid" id="animeGrid"></div>
    </div>

<script>
const BASE_API = "https://www.sankavollerei.com";

const PROXIES = [
    "/api/proxy?url=", // proxy milikmu nanti di vercel
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?",
    "https://thingproxy.freeboard.io/fetch/"
];

async function fetchAPI(endpoint) {
    const target = BASE_API + endpoint;

    for (const proxy of PROXIES) {
        try {
            const url = proxy + encodeURIComponent(target);
            const res = await fetch(url);

            if (!res.ok) continue;

            const text = await res.text();

            // kadang proxy balikin html error
            if (text.startsWith("<")) continue;

            const data = JSON.parse(text);

            console.log("SUCCESS PROXY:", proxy);
            return data;

        } catch (err) {
            console.log("Proxy gagal:", proxy);
        }
    }

    showToast("API gagal diakses");
    return null;
}

function showSkeleton() {
    const grid = document.getElementById('animeGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 8; i++) {
        grid.innerHTML += `
            <div class="anime-card">
                <div class="skeleton" style="height:230px;"></div>
                <div style="padding:10px;">
                    <div class="skeleton" style="height:15px; width:80%;"></div>
                </div>
            </div>`;
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function extractList(data){
    if(!data) return [];

    if(Array.isArray(data.data)) return data.data;
    if(Array.isArray(data)) return data;
    if(data.data?.recent) return data.data.recent;
    if(data.data?.ongoing) return data.data.ongoing;

    return [];
}

async function renderHome() {
    showSkeleton();

    const data = await fetchAPI('/anime/home');
    const list = extractList(data);

    const grid = document.getElementById('animeGrid');
    grid.innerHTML = '';

    if(!list.length){
        grid.innerHTML = "<p>Anime tidak ditemukan dari API.</p>";
        return;
    }

    list.forEach(item => {
        grid.innerHTML += `
            <div class="anime-card" onclick="renderDetail('${item.slug}')">
                <img src="${item.thumbnail || item.image}" 
                onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                <div class="anime-info">
                    <div class="anime-title">${item.title}</div>
                </div>
            </div>`;
    });
}

async function renderDetail(slug) {
    const container = document.getElementById('appContent');
    container.innerHTML = '<h2 class="section-title">Memuat Detail...</h2>';

    const data = await fetchAPI(`/anime/anime/${slug}`);
    if (!data) return renderHome();

    const anime = data.data || data.anime || data;
    const eps = data.episodes || data.data?.episodes || [];

    container.innerHTML = `
        <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:30px;">
            <img src="${anime.thumbnail || anime.image}" style="width:200px; border-radius:10px;">
            <div style="flex:1; min-width:300px;">
                <h1>${anime.title}</h1>
                <p style="color:#94a3b8; margin:15px 0;">${anime.synopsis || 'Tidak ada sinopsis.'}</p>
                <span style="background:var(--primary); padding:5px 12px; border-radius:15px; font-size:12px;">
                ${anime.status || "Unknown"}
                </span>
            </div>
        </div>

        <h2 class="section-title">Daftar Episode</h2>
        <div class="episode-grid">
            ${
                eps.length
                ? eps.map(e => `
                <div class="episode-btn" onclick="playEpisode('${e.slug}')">
                EP ${e.number || e.episode || "?"}
                </div>`).join("")
                : "Belum ada episode"
            }
        </div>
    `;

    window.scrollTo(0,0);
}

function playEpisode(slug) {
    const modal = document.getElementById('videoModal');
    const iframe = document.getElementById('videoFrame');

    modal.style.display = 'flex';

    iframe.src = `${BASE_API}/anime/episode/${slug}`;
}

function closePlayer() {
    document.getElementById('videoModal').style.display = 'none';
    document.getElementById('videoFrame').src = "";
}

async function performSearch() {
    const q = document.getElementById('searchInput').value;
    if(!q) return;

    showSkeleton();
    document.getElementById('titleText').innerText = `Hasil: ${q}`;

    const data = await fetchAPI(`/anime/search/${encodeURIComponent(q)}`);
    const list = extractList(data);

    const grid = document.getElementById('animeGrid');
    grid.innerHTML = '';

    if(!list.length){
        grid.innerHTML = '<p>Tidak ditemukan.</p>';
        return;
    }

    list.forEach(item => {
        grid.innerHTML += `
            <div class="anime-card" onclick="renderDetail('${item.slug}')">
                <img src="${item.thumbnail || item.image}">
                <div class="anime-info">
                    <div class="anime-title">${item.title}</div>
                </div>
            </div>`;
    });
}

renderHome();
</script>
</body>
</html>
